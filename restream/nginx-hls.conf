# /etc/nginx/sites-available/hls  (symlink into sites-enabled, then reload)
# Serves the HLS folder with CORS so the browser (and Cloudflare) can fetch it.
server {
    listen 80 default_server;
    server_name _;

    location = / {
        return 200 'restream ok\n';
        add_header Content-Type text/plain;
    }

    location /hls/ {
        alias /var/www/hls/;

        # CORS — let sportalive.live + Cloudflare fetch the stream
        add_header Access-Control-Allow-Origin '*' always;
        # Never cache the live manifest (rotating window). Segments are short-lived
        # too; keep it simple and no-cache everything — Cloudflare will still
        # coalesce concurrent requests for the same file.
        add_header Cache-Control 'no-cache' always;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
        }
    }
}
